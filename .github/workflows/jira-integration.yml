name: Jira Integration

on:
  pull_request:
    types: [opened, synchronize]
  push:
    branches: [main, develop]

jobs:
  jira-transition:
    runs-on: ubuntu-latest
    permissions: {}
    steps:
      - name: Login no Jira
        uses: atlassian/gajira-login@v3
        env:
          JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
          JIRA_USER_EMAIL: ${{ secrets.JIRA_USER_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}

      - name: Extrair chave do Jira do branch
        id: extract
        uses: atlassian/gajira-find-issue-key@v3
        with:
          from: branch

      - name: Mover card para "EM REVISÃO"
        if: github.event_name == 'pull_request' && steps.extract.outputs.issue != ''
        uses: atlassian/gajira-transition@v3
        with:
          issue: ${{ steps.extract.outputs.issue }}
          transition: "EM REVISÃO"

      - name: Mover card para "CONCLUÍDO"
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' && steps.extract.outputs.issue != ''
        uses: atlassian/gajira-transition@v3
        with:
          issue: ${{ steps.extract.outputs.issue }}
          transition: "CONCLUÍDO"
